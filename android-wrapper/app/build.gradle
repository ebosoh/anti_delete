plugins {
    id 'com.android.application'
}

android {
    namespace 'com.antidelete'
    compileSdk 34

    defaultConfig {
        applicationId "com.antidelete"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    // Explicitly empty to keep binary size under 100 KB
}
